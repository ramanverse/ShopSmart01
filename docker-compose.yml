services:
  # ── Backend (Express + Mongoose) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethereal_backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ethereal_retail
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ethereal_net
    restart: unless-stopped

  # ── Frontend (Vite + React → Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ethereal_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ethereal_net
    restart: unless-stopped

  # ── MongoDB ──
  mongodb:
    image: mongo:7
    container_name: ethereal_db
    ports:
      - "27017:27017"
    volumes:
      - ethereal_mongo_data:/data/db
    networks:
      - ethereal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  ethereal_net:
    driver: bridge

volumes:
  ethereal_mongo_data:
